name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: preview
        type: choice
        options:
          - preview
          - live
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'preview' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve environment
        id: env
        run: echo "name=${{ github.event.inputs.environment || 'preview' }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/socialbulletin-${{ steps.env.outputs.name }}-deployment
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build frontend
        working-directory: apps/web
        run: npm run build

      - name: Install CDK dependencies
        working-directory: deploy/aws
        run: npm ci

      - name: Deploy CDK stacks
        working-directory: deploy/aws
        run: npx cdk deploy --all --require-approval never -c environment=${{ steps.env.outputs.name }}

      - name: Run migrations
        run: sh deploy/aws/scripts/run-migrations.sh ${{ steps.env.outputs.name }}
