# ADR-0014: deployment runs through AWS CDK on merge into `live`.
name: Deploy

on:
  push:
    branches: [live]

concurrency:
  group: deploy-live
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy live
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, pdo_pgsql

      - name: Build frontend assets
        working-directory: apps/web
        env:
          VITE_API_URL: https://api.social.aleherse.com
        run: |
          npm ci
          npm run build

      - name: Package API for Bref
        working-directory: apps/api
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install infrastructure dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy live stacks
        working-directory: infrastructure
        run: npx cdk deploy 'social-bulletin-live-*' --require-approval never

      - name: Run database migrations
        run: |
          FUNCTION_NAME=$(aws cloudformation describe-stacks \
            --stack-name social-bulletin-live-api \
            --query "Stacks[0].Outputs[?OutputKey=='ConsoleFunctionName'].OutputValue" \
            --output text)
          aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --cli-binary-format raw-in-base64-out \
            --payload '"doctrine:migrations:migrate --no-interaction"' \
            migration-output.json
          cat migration-output.json
