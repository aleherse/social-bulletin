name: Deploy live

on:
  push:
    branches: [live]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: live
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
        working-directory: infrastructure
      - run: npm run build
        working-directory: infrastructure
      - run: npx cdk deploy SocialBulletin-live --context environment=live --require-approval never
        working-directory: infrastructure
