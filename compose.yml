name: socialbulletin

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - web
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/php/certs:/etc/socialbulletin/certs:ro
    networks:
      socialbulletin:
        aliases:
          - api.dev.social.aleherse.com
          - app.dev.social.aleherse.com

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /workspace/apps/api
    env_file:
      - .env
    volumes:
      - ./:/workspace
      - composer-cache:/tmp/composer-cache
    depends_on:
      - database
    networks:
      - socialbulletin

  web:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    working_dir: /workspace/apps/web
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: https://api.dev.social.aleherse.com
      VITE_DEV_CERT_DIR: /workspace/docker/php/certs
    volumes:
      - ./:/workspace
      - npm-cache:/home/node/.npm
      - playwright-cache:/home/node/.cache/ms-playwright
    networks:
      - socialbulletin

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-socialbulletin}
      POSTGRES_USER: ${POSTGRES_USER:-socialbulletin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-socialbulletin}
    ports:
      - "5432:5432"
    volumes:
      - database-data:/var/lib/postgresql/data
    networks:
      - socialbulletin

networks:
  socialbulletin:
    name: socialbulletin

volumes:
  database-data:
  composer-cache:
  npm-cache:
  playwright-cache:
