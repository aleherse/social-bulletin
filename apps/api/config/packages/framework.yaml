framework:
    secret: '%env(APP_SECRET)%'
    default_locale: en
    enabled_locales: ['en']
    http_method_override: false
    handle_all_throwables: true
    php_errors:
        log: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file

when@prod:
    framework:
        session:
            cookie_secure: auto
            cookie_samesite: lax
