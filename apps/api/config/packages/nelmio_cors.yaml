nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['^https://app\.dev\.social\.aleherse\.com$']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Accept-Language']
        allow_credentials: true
        expose_headers: ['Link']
        max_age: 3600
    paths:
        '^/': null
