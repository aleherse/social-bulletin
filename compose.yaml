services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        LOCAL_UID: ${LOCAL_UID:-1000}
        LOCAL_GID: ${LOCAL_GID:-1000}
    working_dir: /srv/app
    environment:
      COMPOSER_HOME: /tmp/composer
      DATABASE_URL: postgresql://social_bulletin:social_bulletin@database:5432/social_bulletin?serverVersion=18&charset=utf8
      WEB_ALLOWED_ORIGIN: ^https?://app\.bulletin\.local(:[0-9]+)?$
    volumes:
      - .:/srv/app
    depends_on:
      database:
        condition: service_healthy

  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    profiles:
      - tools
    working_dir: /srv/app
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://api.bulletin.local}
      DEV_ALLOWED_HOST: ${DEV_ALLOWED_HOST:-app.bulletin.local}
    volumes:
      - .:/srv/app

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - php
    ports:
      - "80:80"
    volumes:
      - .:/srv/app:ro
      - ./docker/nginx:/etc/nginx/conf.d:ro

  database:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: social_bulletin
      POSTGRES_USER: social_bulletin
      POSTGRES_PASSWORD: social_bulletin
    ports:
      - "5432:5432"
    volumes:
      - database-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social_bulletin -d social_bulletin"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  database-data:
