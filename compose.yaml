services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        LOCAL_UID: ${LOCAL_UID:-1000}
        LOCAL_GID: ${LOCAL_GID:-1000}
    working_dir: /srv/app
    environment:
      COMPOSER_HOME: /tmp/composer
    volumes:
      - .:/srv/app

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - php
    ports:
      - "80:80"
    volumes:
      - .:/srv/app:ro
      - ./docker/nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
